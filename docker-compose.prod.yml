services:

    # -------------------------------------------------------
    # IMPORTANT:Runs once, enables maintanance mode, executes migrations, disables maintanance mode and stops. But it will not work when you will start app for the first time, because for maintanance mode database cache table will not be created yet. So the first time you will need to migrate manually. Maintanance window will be activated and synced with all services via APP_MAINTENANCE_DRIVER and APP_MAINTENANCE_STORE. So this service is intended for releases, hotfixes, and automatically enables maintanance mode. But remember that it has profile: migrate, so it will not run on standard 'docker compose up'. Use with `docker compose --profile migrate up` and it will run all services + this migrator. If you are using Coolify, you can add `docker compose --profile migrate up -d` in Configuration section -> sidebar: General -> Build section -> Custom Start Command field. Don't worry Coolify will also add neccessary parameters (like -f , envs) to docker compose command by itself. 
    # -------------------------------------------------------
    migrator:
        build:
            context: .
            dockerfile: ./docker_specific/php/Dockerfile
            target: migrator
        command: /usr/local/bin/migrator/run-migrator.sh
        user: "www-data:www-data" 
        # IMPORTANT: Coolify specific command to exclude this service from health check. If you don't use Coolify, then you SHOULD remove this line.
        #exclude_from_hc: true
        # IMPORTANT: Coolify by default puts service to unless-stopped. So keep it if you use Coolify and it will work also without Coolify, in a standard docker compose. So restart: no is harmless to standard docker compose, because it is a default value 
        restart: "no"
        volumes:
            - laravel-storage-production:/var/www/storage
        profiles: ["migrate"] # Prevents this from running on standard 'docker compose up'. Use with `docker compose --profile migrate up` and iw will run all services + this migrator. 
        env_file:
            - .env
        networks:
            - aiagent
        depends_on:
            pgsql:
                condition: service_healthy       

    laravel_php_fpm:
        build:
            context: .
            dockerfile: ./docker_specific/php/Dockerfile
            target: fpm # Use the 'fpm' stage in the Dockerfile
        restart: unless-stopped
        user: "www-data:www-data" 
        volumes:
            - laravel-storage-production:/var/www/storage # Mount the storage volume
            - laravel-public-assets:/var/www/public/build
        env_file:
            - .env
        networks:
            - aiagent
        healthcheck:
            test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3
            # The 'depends_on' attribute with 'condition: service_healthy' ensures that
            # this service will not start until the 'pgsql' service passes its health check.
            # This prevents the application from trying to connect to the database before it's ready.
        depends_on:
            pgsql:
                condition: service_healthy

    nginx:
        build:
            context: .
            dockerfile: ./docker_specific/nginx/Dockerfile
        restart: unless-stopped # Automatically restart unless the service is explicitly stopped
        volumes:
        # Mount the 'laravel-storage-production' volume to '/var/www/storage' inside the container.
        # -----------------------------------------------------------
        # This volume stores persistent data like uploaded files and cache.
        # The ':ro' option mounts it as read-only in the 'nginx' service because Nginx only needs to read these files.
        # The 'php-fpm' service mounts the same volume without ':ro' to allow write operations.
        # -----------------------------------------------------------
            - laravel-storage-production:/var/www/storage:ro
            - laravel-public-assets:/var/www/public/build:ro
        networks:
            - aiagent
        # IMPORTANT: If you use Coolify, it has Traefik on this port, so we don't need to map it. But if you use raw docker compose, then you SHOULD map it.
        ports:
            - "${NGINX_PORT:-80}:80"
        healthcheck:
            test: ["CMD", "curl", "--fail", "http://localhost"]
            interval: 1m30s
            timeout: 10s
            retries: 3
        depends_on:
            laravel_php_fpm:
                condition: service_healthy

    laravel_queue_worker:
        build:
            context: .
            dockerfile: ./docker_specific/php/Dockerfile
            target: worker
        restart: unless-stopped
        user: "www-data:www-data" 
        volumes:
            - laravel-storage-production:/var/www/storage
        tty: true # Enables an interactive terminal
        stdin_open: true # Keeps standard input open for 'docker exec'
        env_file:
            - .env
        networks:
            - aiagent
        healthcheck:
            test: ["CMD-SHELL", "pgrep -f 'queue:work' > /dev/null || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 50s
        depends_on:
            pgsql:
                condition: service_healthy
            laravel_php_fpm:
                condition: service_healthy   

    pgsql:
        image: 'postgres:17'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        restart: unless-stopped
        volumes:
            - 'aiagent-pgsql:/var/lib/postgresql/data'
            # Any .sql files in /docker-entrypoint-initdb.d/ run automatically on first container startup
            # This only runs on first launch (when the volume is empty)
            # Numbers in filenames (like 01-init-databases.sql) control execution order if you have multiple scripts
            - './docker_specific/database/init:/docker-entrypoint-initdb.d'
        networks:
            - aiagent
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s

    n8n:
        image: n8nio/n8n:latest
        environment:
            - DB_TYPE=postgresdb
            - DB_POSTGRESDB_HOST=pgsql
            - DB_POSTGRESDB_PORT=5432
            - DB_POSTGRESDB_DATABASE=n8n_database
            - DB_POSTGRESDB_USER=${DB_USERNAME}
            - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
            - N8N_RUNNERS_ENABLED=true
            - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
            # - N8N_DIAGNOSTICS_ENABLED=false
            # - N8N_PERSONALIZATION_ENABLED=false
            # - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
            # - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
        restart: unless-stopped
        ports:
            - 5678:5678
        healthcheck:
            test: wget --spider http://localhost:5678/healthz > /dev/null 2>&1 || exit 1
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 1m00s
        networks:
            - aiagent
        volumes:
            - n8n_storage:/home/node/.n8n
            - ./n8n/backup:/backup
        depends_on:
            pgsql:
                condition: service_healthy  

networks:
    aiagent:
        driver: bridge
volumes:
    laravel-public-assets:
        driver: local
    laravel-storage-production:
        driver: local
    aiagent-pgsql:
        driver: local
    n8n_storage:
        driver: local